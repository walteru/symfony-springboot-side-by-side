server.port=8080
spring.thymeleaf.cache=false
spring.application.name=sidebyside-springboot

# Sprint 2: persistencia en MySQL. En Docker, docker-compose define SPRING_DATASOURCE_*.
# Los defaults apuntan al puerto host (3310) para correr fuera de Docker si hace falta.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3310/app_springboot}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:app_demo_not_for_production}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

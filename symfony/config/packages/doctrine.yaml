doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        # MySQL en runtime (Docker). Ver docker-compose.yml.
        server_version: '8.0'
        charset: utf8mb4
    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        report_fields_where_declared: true
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        mappings:
            App:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App

when@test:
    doctrine:
        dbal:
            # Tests sin MySQL vivo: SQLite en archivo dentro de var/.
            # El esquema y los datos se crean en el setUp de cada test (paridad con Spring Boot via H2).
            url: 'sqlite:///%kernel.project_dir%/var/test.db'
            server_version: ~
